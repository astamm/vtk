# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }}, VTK ${{ matrix.config.vtk }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # ── macOS ──────────────────────────────────────────────────────────
          - {os: macos-latest,  r: 'release', vtk: 'system'}
          - {os: macos-latest,  r: 'release', vtk: 'prebuilt'}
          # ── Windows ────────────────────────────────────────────────────────
          - {os: windows-latest, r: 'release', vtk: 'system'}
          - {os: windows-latest, r: 'release', vtk: 'prebuilt'}
          # ── Linux ──────────────────────────────────────────────────────────
          - {os: ubuntu-latest, r: 'release',  vtk: 'system'}
          - {os: ubuntu-latest, r: 'devel',    vtk: 'prebuilt', http-user-agent: 'release'}
          - {os: ubuntu-latest, r: 'release',  vtk: 'prebuilt'}
          - {os: ubuntu-latest, r: 'oldrel-1', vtk: 'prebuilt'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # ── Install system VTK (skipped for prebuilt matrix entries) ──────────
      - name: Install system VTK (macOS)
        if: runner.os == 'macOS' && matrix.config.vtk == 'system'
        run: brew install vtk

      - name: Install system VTK (Windows / Rtools45 pacman)
        if: runner.os == 'Windows' && matrix.config.vtk == 'system'
        shell: bash
        run: pacman -S --noconfirm mingw-w64-ucrt-x86_64-vtk

      - name: Install system VTK (Linux)
        if: runner.os == 'Linux' && matrix.config.vtk == 'system'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libvtk9-dev || sudo apt-get install -y libvtk-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
