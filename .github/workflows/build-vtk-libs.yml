name: Build VTK Static Libraries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      vtk_version:
        description: 'VTK version to build (override default)'
        required: false
        default: ''

env:
  VTK_VERSION: '9.5.2'

jobs:
  # ── Windows: native UCRT64 build via Rtools bash (MSYS2) ──────────────────
  build-windows:
    name: Windows (ucrt-x64)
    runs-on: windows-latest
    env:
      MSYSTEM: UCRT64
      CHERE_INVOKING: '1'
    defaults:
      run:
        shell: C:\rtools45\usr\bin\bash.exe --login -eo pipefail {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up R and Rtools45
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          rtools-version: '45'
        # r-lib/actions uses pwsh internally — that's fine; our run steps use bash

      - name: Install build tools via pacman
        run: |
          pacman -Sy --noconfirm --needed \
            mingw-w64-ucrt-x86_64-cmake \
            mingw-w64-ucrt-x86_64-ninja \
            mingw-w64-ucrt-x86_64-gcc \
            mingw-w64-ucrt-x86_64-binutils

      - name: Download VTK source
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          URL="https://www.vtk.org/files/release/${MINOR}/VTK-${VER}.tar.gz"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o vtk-src.tar.gz
          tar -xzf vtk-src.tar.gz

      - name: Configure VTK
        run: |
          VER="${{ env.VTK_VERSION }}"
          mkdir -p build
          cd build
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$(pwd)/../install" \
            -DCMAKE_C_COMPILER=/ucrt64/bin/gcc \
            -DCMAKE_CXX_COMPILER=/ucrt64/bin/g++ \
            -DCMAKE_RC_COMPILER=/ucrt64/bin/windres \
            -DBUILD_SHARED_LIBS=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            ../VTK-${VER}

      - name: Build and install VTK
        run: |
          cd build
          ninja -j$(nproc)
          ninja install

      - name: Package archive
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          PKG="vtk-${VER}-ucrt-x64"
          mkdir -p "${PKG}/include/vtk-${MINOR}" "${PKG}/lib"
          # Headers
          SRC_INC=$(find install/include -maxdepth 1 -name "vtk-*" -type d | sort -V | tail -1)
          if [ -n "${SRC_INC}" ]; then
            cp -R "${SRC_INC}/"* "${PKG}/include/vtk-${MINOR}/"
          fi
          # Static libraries
          find install/lib -name "*.a" -exec cp {} "${PKG}/lib/" \;
          7z a -tzip "${PKG}.zip" "${PKG}"
          echo "Created ${PKG}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: vtk-windows-ucrt-x64
          path: vtk-${{ env.VTK_VERSION }}-ucrt-x64.zip
          retention-days: 7

  # ── macOS arm64 ────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest   # Apple silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake + ninja
        run: brew install cmake ninja

      - name: Download VTK source
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          curl -fsSL "https://www.vtk.org/files/release/${MINOR}/VTK-${VER}.tar.gz" -o vtk-src.tar.gz
          tar -xzf vtk-src.tar.gz

      - name: Configure VTK
        run: |
          VER="${{ env.VTK_VERSION }}"
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$PWD/../install" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_SHARED_LIBS=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            ../VTK-${VER}

      - name: Build and install VTK
        run: |
          cd build
          ninja -j$(sysctl -n hw.logicalcpu)
          ninja install

      - name: Package archive
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          PKG="vtk-${VER}-darwin-arm64"
          mkdir -p "${PKG}/include/vtk-${MINOR}" "${PKG}/lib"
          # Headers
          SRC_INC=$(find install/include -maxdepth 1 -name "vtk-*" -type d | sort -V | tail -1)
          if [ -n "${SRC_INC}" ]; then
            cp -R "${SRC_INC}/"* "${PKG}/include/vtk-${MINOR}/"
          fi
          # Static libraries
          find install/lib -name "*.a" -exec cp {} "${PKG}/lib/" \;
          tar -czf "${PKG}.tar.gz" "${PKG}"
          echo "Created ${PKG}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: vtk-macos-arm64
          path: vtk-${{ env.VTK_VERSION }}-darwin-arm64.tar.gz
          retention-days: 7

  # ── macOS x86_64 ───────────────────────────────────────────────────────────
  build-macos-x86_64:
    name: macOS x86_64
    runs-on: macos-13         # Intel runner
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake + ninja
        run: brew install cmake ninja

      - name: Download VTK source
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          curl -fsSL "https://www.vtk.org/files/release/${MINOR}/VTK-${VER}.tar.gz" -o vtk-src.tar.gz
          tar -xzf vtk-src.tar.gz

      - name: Configure VTK
        run: |
          VER="${{ env.VTK_VERSION }}"
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$PWD/../install" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DBUILD_SHARED_LIBS=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            ../VTK-${VER}

      - name: Build and install VTK
        run: |
          cd build
          ninja -j$(sysctl -n hw.logicalcpu)
          ninja install

      - name: Package archive
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          PKG="vtk-${VER}-darwin-x86_64"
          mkdir -p "${PKG}/include/vtk-${MINOR}" "${PKG}/lib"
          SRC_INC=$(find install/include -maxdepth 1 -name "vtk-*" -type d | sort -V | tail -1)
          if [ -n "${SRC_INC}" ]; then
            cp -R "${SRC_INC}/"* "${PKG}/include/vtk-${MINOR}/"
          fi
          find install/lib -name "*.a" -exec cp {} "${PKG}/lib/" \;
          tar -czf "${PKG}.tar.gz" "${PKG}"
          echo "Created ${PKG}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: vtk-macos-x86_64
          path: vtk-${{ env.VTK_VERSION }}-darwin-x86_64.tar.gz
          retention-days: 7

  # ── Linux x86_64 ───────────────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential libgl1-mesa-dev \
            libxt-dev libxrender-dev libxext-dev

      - name: Download VTK source
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          curl -fsSL "https://www.vtk.org/files/release/${MINOR}/VTK-${VER}.tar.gz" -o vtk-src.tar.gz
          tar -xzf vtk-src.tar.gz

      - name: Configure VTK
        run: |
          VER="${{ env.VTK_VERSION }}"
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$PWD/../install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_C_FLAGS="-fPIC" \
            -DCMAKE_CXX_FLAGS="-fPIC" \
            ../VTK-${VER}

      - name: Build and install VTK
        run: |
          cd build
          ninja -j$(nproc)
          ninja install

      - name: Package archive
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          PKG="vtk-${VER}-linux-x86_64"
          mkdir -p "${PKG}/include/vtk-${MINOR}" "${PKG}/lib"
          SRC_INC=$(find install/include -maxdepth 1 -name "vtk-*" -type d | sort -V | tail -1)
          if [ -n "${SRC_INC}" ]; then
            cp -R "${SRC_INC}/"* "${PKG}/include/vtk-${MINOR}/"
          fi
          find install/lib -name "*.a" -exec cp {} "${PKG}/lib/" \;
          tar -czf "${PKG}.tar.gz" "${PKG}"
          echo "Created ${PKG}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: vtk-linux-x86_64
          path: vtk-${{ env.VTK_VERSION }}-linux-x86_64.tar.gz
          retention-days: 7

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos-arm64, build-macos-x86_64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create / update release v${{ env.VTK_VERSION }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VTK_VERSION }}
          name: VTK ${{ env.VTK_VERSION }} — pre-built static libraries
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            Pre-built VTK **${{ env.VTK_VERSION }}** static (`.a`) libraries for
            use with the [`vtk`](https://github.com/astamm/vtk) R package.

            ## Archives

            | Platform | Archive |
            |---|---|
            | Windows (Rtools45 UCRT x64) | `vtk-${{ env.VTK_VERSION }}-ucrt-x64.zip` |
            | macOS arm64 (Apple Silicon) | `vtk-${{ env.VTK_VERSION }}-darwin-arm64.tar.gz` |
            | macOS x86\_64 (Intel) | `vtk-${{ env.VTK_VERSION }}-darwin-x86_64.tar.gz` |
            | Linux x86\_64 | `vtk-${{ env.VTK_VERSION }}-linux-x86_64.tar.gz` |

            ## Archive layout

            ```
            include/vtk-9.5/    ← VTK headers
            lib/                ← static libraries (.a)
            ```

            ## CMake flags

            ```cmake
            -DBUILD_SHARED_LIBS=OFF
            -DVTK_BUILD_ALL_MODULES=OFF
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
            ```
          files: |
            artifacts/vtk-windows-ucrt-x64/vtk-${{ env.VTK_VERSION }}-ucrt-x64.zip
            artifacts/vtk-macos-arm64/vtk-${{ env.VTK_VERSION }}-darwin-arm64.tar.gz
            artifacts/vtk-macos-x86_64/vtk-${{ env.VTK_VERSION }}-darwin-x86_64.tar.gz
            artifacts/vtk-linux-x86_64/vtk-${{ env.VTK_VERSION }}-linux-x86_64.tar.gz
