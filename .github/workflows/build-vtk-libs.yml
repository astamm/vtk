name: Build VTK Static Libraries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      vtk_version:
        description: 'VTK version to build (override default)'
        required: false
        default: ''
      force_rebuild:
        description: 'Force rebuild even if cache exists (bust cache)'
        required: false
        type: boolean
        default: false

env:
  VTK_VERSION: '9.5.2'

jobs:
  # ── Windows: x86_64-w64-mingw32.static.posix (Rtools45 R-package toolchain) ─
  build-windows:
    name: Windows (static-posix-x64)
    runs-on: windows-latest
    env:
      MSYSTEM: UCRT64      # bash session init; cmake/ninja come from ucrt64
      CHERE_INVOKING: '1'
    defaults:
      run:
        shell: C:\rtools45\usr\bin\bash.exe --login -eo pipefail {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up R and Rtools45
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          rtools-version: '45'
        # r-lib/actions uses pwsh internally — that's fine; our run steps use bash

      - name: Restore build cache
        id: cache
        uses: actions/cache@v4
        with:
          path: install
          key: vtk-${{ env.VTK_VERSION }}-windows-static-posix-x64${{ inputs.force_rebuild == 'true' && format('-bust-{0}', github.run_id) || '' }}

      - name: Install build tools via pacman (cmake + ninja only; compiler from static.posix)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          pacman -Sy --noconfirm --needed \
            mingw-w64-ucrt-x86_64-cmake \
            mingw-w64-ucrt-x86_64-ninja
          # ucrt64: cmake + ninja; static.posix: gcc/g++/as/ar/ranlib
          echo "export PATH=/x86_64-w64-mingw32.static.posix/bin:/ucrt64/bin:\$PATH" >> ~/.bash_profile

      - name: Download VTK source
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          URL="https://www.vtk.org/files/release/${MINOR}/VTK-${VER}.tar.gz"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o vtk-src.tar.gz
          tar -xzf vtk-src.tar.gz

      - name: Configure VTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ env.VTK_VERSION }}"
          # x86_64-w64-mingw32.static.posix — the toolchain used by R CMD INSTALL
          # on CRAN/Rtools45.  Using it ensures symbols match what downstream
          # packages expect (no __imp_* DLL-import stubs, no UCRT-only symbols).
          # Ensure the static.posix toolchain (gcc, g++, as, ar, ranlib …) is
          # on PATH so gcc can exec its helper tools (as, ld, …) by name.
          export PATH="/x86_64-w64-mingw32.static.posix/bin:${PATH}"
          TCHAIN=/x86_64-w64-mingw32.static.posix/bin
          export CC="${TCHAIN}/gcc"
          export CXX="${TCHAIN}/g++"
          export AR="${TCHAIN}/ar"
          export RANLIB="${TCHAIN}/ranlib"
          mkdir -p build install
          INSTALL_PREFIX="$(cygpath -w "$(pwd)/install")"
          cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${INSTALL_PREFIX}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES \
            -DVTK_MODULE_ENABLE_VTK_IONetCDF=NO \
            -DVTK_MODULE_ENABLE_VTK_IOHDF=NO \
            -DVTK_MODULE_ENABLE_VTK_GeovisCore=NO \
            -DVTK_MODULE_ENABLE_VTK_RenderingCore=NO \
            -DVTK_MODULE_ENABLE_VTK_netcdf=NO \
            -DVTK_MODULE_ENABLE_VTK_libproj=NO \
            -DVTK_MODULE_USE_EXTERNAL_VTK_netcdf=OFF \
            -DVTK_MODULE_USE_EXTERNAL_VTK_libproj=NO \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DH5_HAVE_VASPRINTF:INTERNAL=0 \
            ../VTK-${VER}

      - name: Build and install VTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd build
          ninja -j$(nproc)
          ninja install

      - name: Package archive
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          PKG="vtk-${VER}-static-posix-x64"
          mkdir -p "${PKG}/include/vtk-${MINOR}" "${PKG}/lib"
          # Headers
          SRC_INC=$(find install/include -maxdepth 1 -name "vtk-*" -type d | sort -V | tail -1)
          if [ -n "${SRC_INC}" ]; then
            cp -R "${SRC_INC}/"* "${PKG}/include/vtk-${MINOR}/"
          fi
          # Static libraries
          find install/lib -name "*.a" -exec cp {} "${PKG}/lib/" \;
          zip -r "${PKG}.zip" "${PKG}"
          echo "Created ${PKG}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: vtk-windows-static-posix-x64
          path: vtk-${{ env.VTK_VERSION }}-static-posix-x64.zip
          retention-days: 7

  # ── macOS arm64 ────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest   # Apple silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Restore build cache
        id: cache
        uses: actions/cache@v4
        with:
          path: install
          key: vtk-${{ env.VTK_VERSION }}-macos-arm64${{ inputs.force_rebuild == 'true' && format('-bust-{0}', github.run_id) || '' }}

      - name: Install cmake + ninja
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      - name: Download VTK source
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          curl -fsSL "https://www.vtk.org/files/release/${MINOR}/VTK-${VER}.tar.gz" -o vtk-src.tar.gz
          tar -xzf vtk-src.tar.gz

      - name: Configure VTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ env.VTK_VERSION }}"
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/../install" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_SHARED_LIBS=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            ../VTK-${VER}

      - name: Build and install VTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd build
          ninja -j$(sysctl -n hw.logicalcpu)
          ninja install

      - name: Package archive
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          PKG="vtk-${VER}-darwin-arm64"
          mkdir -p "${PKG}/include/vtk-${MINOR}" "${PKG}/lib"
          # Headers
          SRC_INC=$(find install/include -maxdepth 1 -name "vtk-*" -type d | sort -V | tail -1)
          if [ -n "${SRC_INC}" ]; then
            cp -R "${SRC_INC}/"* "${PKG}/include/vtk-${MINOR}/"
          fi
          # Static libraries
          find install/lib -name "*.a" -exec cp {} "${PKG}/lib/" \;
          tar -czf "${PKG}.tar.gz" "${PKG}"
          echo "Created ${PKG}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: vtk-macos-arm64
          path: vtk-${{ env.VTK_VERSION }}-darwin-arm64.tar.gz
          retention-days: 7

  # ── macOS x86_64 ───────────────────────────────────────────────────────────
  build-macos-x86_64:
    name: macOS x86_64
    runs-on: macos-latest     # arm64 runner; cross-compile to x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Restore build cache
        id: cache
        uses: actions/cache@v4
        with:
          path: install
          key: vtk-${{ env.VTK_VERSION }}-macos-x86_64${{ inputs.force_rebuild == 'true' && format('-bust-{0}', github.run_id) || '' }}

      - name: Install cmake + ninja
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      - name: Download VTK source
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          curl -fsSL "https://www.vtk.org/files/release/${MINOR}/VTK-${VER}.tar.gz" -o vtk-src.tar.gz
          tar -xzf vtk-src.tar.gz

      - name: Configure VTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ env.VTK_VERSION }}"
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/../install" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DBUILD_SHARED_LIBS=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            ../VTK-${VER}

      - name: Build and install VTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd build
          ninja -j$(sysctl -n hw.logicalcpu)
          ninja install

      - name: Package archive
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          PKG="vtk-${VER}-darwin-x86_64"
          mkdir -p "${PKG}/include/vtk-${MINOR}" "${PKG}/lib"
          SRC_INC=$(find install/include -maxdepth 1 -name "vtk-*" -type d | sort -V | tail -1)
          if [ -n "${SRC_INC}" ]; then
            cp -R "${SRC_INC}/"* "${PKG}/include/vtk-${MINOR}/"
          fi
          find install/lib -name "*.a" -exec cp {} "${PKG}/lib/" \;
          tar -czf "${PKG}.tar.gz" "${PKG}"
          echo "Created ${PKG}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: vtk-macos-x86_64
          path: vtk-${{ env.VTK_VERSION }}-darwin-x86_64.tar.gz
          retention-days: 7

  # ── Linux x86_64 ───────────────────────────────────────────────────────────
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore build cache
        id: cache
        uses: actions/cache@v4
        with:
          path: install
          key: vtk-${{ env.VTK_VERSION }}-linux-x86_64${{ inputs.force_rebuild == 'true' && format('-bust-{0}', github.run_id) || '' }}

      - name: Install build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential libgl1-mesa-dev \
            libxt-dev libxrender-dev libxext-dev

      - name: Download VTK source
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          curl -fsSL "https://www.vtk.org/files/release/${MINOR}/VTK-${VER}.tar.gz" -o vtk-src.tar.gz
          tar -xzf vtk-src.tar.gz

      - name: Configure VTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          VER="${{ env.VTK_VERSION }}"
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/../install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_C_FLAGS="-fPIC" \
            -DCMAKE_CXX_FLAGS="-fPIC" \
            ../VTK-${VER}

      - name: Build and install VTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd build
          ninja -j$(nproc)
          ninja install

      - name: Package archive
        run: |
          VER="${{ env.VTK_VERSION }}"
          MINOR="${VER%.*}"
          PKG="vtk-${VER}-linux-x86_64"
          mkdir -p "${PKG}/include/vtk-${MINOR}" "${PKG}/lib"
          SRC_INC=$(find install/include -maxdepth 1 -name "vtk-*" -type d | sort -V | tail -1)
          if [ -n "${SRC_INC}" ]; then
            cp -R "${SRC_INC}/"* "${PKG}/include/vtk-${MINOR}/"
          fi
          find install/lib -name "*.a" -exec cp {} "${PKG}/lib/" \;
          tar -czf "${PKG}.tar.gz" "${PKG}"
          echo "Created ${PKG}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: vtk-linux-x86_64
          path: vtk-${{ env.VTK_VERSION }}-linux-x86_64.tar.gz
          retention-days: 7

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos-arm64, build-macos-x86_64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Delete stale ucrt-x64 asset if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset v${{ env.VTK_VERSION }} \
            "vtk-${{ env.VTK_VERSION }}-ucrt-x64.zip" \
            --repo ${{ github.repository }} --yes 2>/dev/null || true

      - name: Create / update release v${{ env.VTK_VERSION }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VTK_VERSION }}
          name: VTK ${{ env.VTK_VERSION }} — pre-built static libraries
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            Pre-built VTK **${{ env.VTK_VERSION }}** static (`.a`) libraries for use with the [`rvtk`](https://github.com/astamm/rvtk) R package.

            ## Archives

            | Platform | Archive |
            |---|---|
            | Windows (Rtools45 static.posix x64) | `vtk-${{ env.VTK_VERSION }}-static-posix-x64.zip` |
            | macOS arm64 (Apple Silicon) | `vtk-${{ env.VTK_VERSION }}-darwin-arm64.tar.gz` |
            | macOS x86\_64 (Intel) | `vtk-${{ env.VTK_VERSION }}-darwin-x86_64.tar.gz` |
            | Linux x86\_64 | `vtk-${{ env.VTK_VERSION }}-linux-x86_64.tar.gz` |

            ## Archive layout

            ```
            include/vtk-9.5/    ← VTK headers
            lib/                ← static libraries (.a)
            ```

            ## CMake flags (all platforms)

            ```cmake
            -DBUILD_SHARED_LIBS=OFF
            -DVTK_BUILD_ALL_MODULES=OFF
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES
            -DVTK_MODULE_ENABLE_VTK_IOCore=YES
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
            ```

            ### Windows additional flags

            ```cmake
            # Compiler: x86_64-w64-mingw32.static.posix (Rtools45 R-package toolchain)
            # Set via CC/CXX/AR/RANLIB environment variables before cmake invocation.
            # Modules disabled because static libs are not available in the sysroot:
            -DVTK_MODULE_ENABLE_VTK_IONetCDF=NO
            -DVTK_MODULE_ENABLE_VTK_IOHDF=NO
            -DVTK_MODULE_ENABLE_VTK_GeovisCore=NO
            -DVTK_MODULE_ENABLE_VTK_RenderingCore=NO
            -DVTK_MODULE_ENABLE_VTK_netcdf=NO
            -DVTK_MODULE_ENABLE_VTK_libproj=NO
            -DVTK_MODULE_USE_EXTERNAL_VTK_netcdf=OFF
            -DVTK_MODULE_USE_EXTERNAL_VTK_libproj=NO
            -DH5_HAVE_VASPRINTF:INTERNAL=0
            ```
          files: |
            artifacts/vtk-windows-static-posix-x64/vtk-${{ env.VTK_VERSION }}-static-posix-x64.zip
            artifacts/vtk-macos-arm64/vtk-${{ env.VTK_VERSION }}-darwin-arm64.tar.gz
            artifacts/vtk-macos-x86_64/vtk-${{ env.VTK_VERSION }}-darwin-x86_64.tar.gz
            artifacts/vtk-linux-x86_64/vtk-${{ env.VTK_VERSION }}-linux-x86_64.tar.gz
